<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Konto erstellen – METRO Partner Portal</title>

  <!-- =========================================================
       1) ONETRUST REQUIRED SCRIPTS — DO NOT MODIFY
  ========================================================== -->

  <script>
    window.OtSdk = window.OtSdk || function () {
      (OtSdk.q = OtSdk.q || []).push(arguments);
    };
  </script>

  <script
    src="https://privacyportaltrial.onetrust.com/consent-embedded-forms/consent-receipt-scripts/OtFormStub.js"
    data-id="db31dbf8-b2d1-4cfd-9927-ae1dd124a6dd"
    worker="https://consent-api.onetrust.com">
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --metro-blue:        #003D7A;
      --metro-blue-dark:   #002855;
      --metro-yellow:      #FFCC00;
      --metro-bg:          #0f172a;
      --metro-bg-light:    #1e293b;
      --metro-card:        #111827;
      --metro-text:        #ffffff;
      --metro-muted:       #9ca3af;
      --metro-border:      rgba(255,255,255,0.08);
      --metro-font:        Inter, "Helvetica Neue", Arial, sans-serif;
      --radius:            10px;
    }

    html, body {
      background: var(--metro-bg);
      color: var(--metro-text);
      font-family: var(--metro-font);
      min-height: 100vh;
    }

    /* ── Header ── */
    header.top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(2,40,85,0.98), rgba(2,40,85,0.9));
      border-bottom: 1px solid var(--metro-border);
    }

    .top-bar-inner {
      display: flex;
      align-items: center;
      height: 72px;
      padding: 0 32px;
      gap: 16px;
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }

    .metro-logo {
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 1px;
      background: var(--metro-yellow);
      color: var(--metro-blue);
      padding: 6px 10px;
    }

    .brand-subtitle {
      font-size: 18px;
      font-weight: 700;
    }

    .back-link {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--metro-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }

    .back-link:hover { color: var(--metro-text); }

    /* ── Page ── */
    .page-wrapper {
      min-height: calc(100vh - 72px);
      display: flex;
      justify-content: center;
      padding: 56px 24px 80px;
      background: radial-gradient(circle at 70% 0%, rgba(255,204,0,0.06), transparent 55%);
    }

    .card {
      background: var(--metro-card);
      border: 1px solid var(--metro-border);
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 560px;
    }

    .card-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--metro-yellow);
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--metro-muted);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--metro-muted);
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--metro-border);
    }

    .divider {
      height: 1px;
      background: var(--metro-border);
      margin: 32px 0;
    }

    .card-footer {
      text-align: center;
      font-size: 13px;
      color: var(--metro-muted);
    }

    .card-footer a {
      color: var(--metro-yellow);
      text-decoration: none;
      font-weight: 600;
    }

    #ot-container { margin-top: 6px; }

    /* Submit button override */
    .ot-submit {
      background: var(--metro-yellow) !important;
      color: var(--metro-blue) !important;
      font-weight: 800 !important;
      letter-spacing: 0.5px !important;
    }

    .ot-submit:hover {
      background: var(--metro-blue) !important;
      color: var(--metro-yellow) !important;
    }

    @media (max-width: 640px) {
      .card { padding: 28px 20px; }
      .top-bar-inner { padding: 0 16px; }
    }
  </style>
</head>

<body>

<header class="top-bar">
  <div class="top-bar-inner">
    <a href="/" class="logo-link">
      <div class="metro-logo">METRO</div>
      <div class="brand-subtitle">Partner Portal</div>
    </a>
    <a href="/" class="back-link">← Zurück</a>
  </div>
</header>

<div class="page-wrapper">
  <div class="card">
    <div class="card-eyebrow">METRO · Partner</div>
    <h1 class="card-title">Konto erstellen</h1>
    <p class="card-subtitle">
      Erstellen Sie Ihr METRO Partnerkonto, um Ihre Sammelstelle oder Organisation zu registrieren und zu verwalten.
    </p>

    <div class="section-label">Ihre Daten & Einwilligungen</div>

    <!-- OneTrust renders form -->
    <div id="ot-container"></div>

    <div class="divider"></div>

    <div class="card-footer">
      Bereits registriert?
      <a href="/anmelden.html">Jetzt anmelden</a>
    </div>
  </div>
</div>

<!-- =========================================================
     ONETRUST LOADING — DO NOT MODIFY
========================================================== -->

<script>
  const CP_ID = "d54fe0a0-9009-4b48-89d6-3b0dab77d9bb";

  function whenOTReady(callback) {
    const timer = setInterval(() => {
      if (window.OneTrust && OneTrust.webform?.InstallCP) {
        clearInterval(timer);
        callback();
      }
    }, 80);
  }

  window.addEventListener("DOMContentLoaded", () => {
    whenOTReady(() => {
      OneTrust.webform.InstallCP(CP_ID, { target: "#ot-container" });
    });
  });
</script>

</body>
</html>
