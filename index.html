<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>METRO – GitHub Pages Demo (Fixed Header)</title>

  <style>
    :root {
      --metro-blue: #0a4a93;
      --metro-link: #0f7fd8;
      --page-bg: #e6eff4;
      --white: #ffffff;
      --border: #d5dee6;

      /* ✅ LOCKED METRO HEADER HEIGHT */
      --nav-height: 96px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, "Segoe UI", sans-serif;
      background: var(--page-bg);
    }

    /* ================= HEADER ================= */

    .nav-shell {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100vw - 160px);

      /* ✅ hard lock */
      height: var(--nav-height);
      min-height: var(--nav-height);
      max-height: var(--nav-height);

      background: var(--white);
      border-radius: 6px;
      box-shadow: 0 10px 28px rgba(10,45,88,.08);

      display: flex;
      align-items: center;

      padding: 6px 24px;
      z-index: 100;
    }

    .logo-link img {
      width: 150px;
    }

    .nav-primary,
    .nav-utility {
      display: flex;
      align-items: center;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-primary {
      flex: 1;
      margin-left: 36px;
    }

    .nav-item,
    .nav-tool {
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
    }

    /* ✅ divider fix */
    .nav-item::after,
    .nav-tool::after {
      content: "";
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 40px;
      background: var(--border);
    }

    .nav-item:last-child::after,
    .nav-tool:last-child::after {
      display: none;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;

      padding: 0 22px;

      font-size: 20px;
      font-weight: 700;
      color: var(--metro-blue);
      text-decoration: none;

      /* ✅ pixel‑tuned */
      line-height: 1.15;
      padding-top: 1px;
      padding-bottom: 1px;
    }

    .nav-link.contact {
      color: var(--metro-link);
    }

    .caret {
      width: 12px;
      height: 12px;
      margin-top: 2px;
    }

    .caret svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
    }

    .nav-tool-btn {
      width: 64px;
      height: 100%;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--metro-blue);
    }

    /* ✅ icon pixel correction */
    .nav-tool-btn .icon {
      width: 24px;
      height: 24px;
      transform: translateY(1px);
    }

    .icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
    }

    /* ================= PAGE PLACEHOLDER ================= */

    .page-fill {
      height: 120vh;
      padding-top: 160px;
      text-align: center;
      color: #123;
    }
  </style>
</head>

<body>

  <nav class="nav-shell">
    <a class="logo-link" href="#">
      <img src="https://www.metroag.de/-/media/project/mag/shared/global/common/metro-logo-full_facelift.svg" alt="METRO">
    </a>

    <ul class="nav-primary">
      <li class="nav-item">
        <a class="nav-link" href="#">Newsroom
          <span class="caret">
            <svg viewBox="0 0 12 12"><path d="M2 4.5 6 8l4-3.5"/></svg>
          </span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Karriere
          <span class="caret">
            <svg viewBox="0 0 12 12"><path d="M2 4.5 6 8l4-3.5"/></svg>
          </span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link contact" href="#">Kontakt</a>
      </li>
    </ul>

    <ul class="nav-utility">
      <li class="nav-tool">
        <button class="nav-tool-btn">
          <span class="icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="M16 16 21 21"/></svg>
          </span>
        </button>
      </li>
      <li class="nav-tool">
        <button class="nav-tool-btn">
          <span class="icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v3M12 18.5v3M21.5 12h-3M5.5 12h-3"/></svg>
          </span>
        </button>
      </li>
    </ul>
  </nav>

  <div class="page-fill">
    <h1>Header is now pixel‑locked and overlap‑free ✅</h1>
  </div>

</body>
</html>
``
