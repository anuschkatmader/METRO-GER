<!DOCTYPE html>
<html lang="de" class="no-js">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>METRO AG</title>

  <!-- original METRO styles -->
  <link rel="stylesheet" href="https://www.metroag.de/-/media/feature/mag/bootstrap-45/bootstrap-45/styles/optimizededia/themes/mag/metroag/metro-components/styles/optimized-min.csshemes/mag/metroag/metro-white/styles/optimized-min.css===
       CLEANUP + STABILITY FIXES (GitHub Pages safe)
       ===================================================== -->
  <style>
    /* Remove broken pseudo-elements that show as squares */
    nav.main_nav a::before,
    nav.main_nav a::after,
    nav.main_nav button::before,
    nav.main_nav button::after {
      content: none !important;
      display: none !important;
    }

    nav.main_nav a:focus,
    nav.main_nav button:focus {
      outline: none !important;
      box-shadow: none !important;
    }

    /* Reserve space for sticky header so hero does not overlap */
    body {
      padding-top: 96px;
    }

    nav.main_nav {
      position: sticky;
      top: 0;
      z-index: 10000;
    }

    /* Stabilise hero height */
    .main_header__figure,
    .main_header__content {
      min-height: 520px;
    }

    /* Keep empty dynamic sections visually clean */
    .search-results,
    .latest-news,
    .latest-events {
      min-height: 120px;
    }

    /* Privacy settings button */
    .privacy-settings-btn {
      font-weight: 600;
      color: #003c74;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .privacy-settings-btn:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body class="default-device bodyclass">

<div id="wrapper">

  <!-- ================= HEADER ================= -->
  <header>
    <nav class="main_nav">
      <div class="container">
        <div class="main_nav__container">

          <div class="main_nav__logo">
            <a href="/de">
              <img src="https://www.metroag.de/-/media/project/mag/shared/global/common/metro-logo-full_facelift.svg"
                   alt="METRO" height="32" />
            </a>
          </div>

          <div class="main_nav__navi" id="mainNav">
            <ul class="main_nav__navi__tree">
              <li class="main_nav__navi__tree__item"><a href="#"><span>Über uns</span></a></li>
              <li class="main_nav__navi__tree__item"><a href="#"><span>Investoren</span></a></li>
              <li class="main_nav__navi__tree__item"><a href="#"><span>Verantwortung</span></a></li>
              <li class="main_nav__navi__tree__item"><a href="#"><span>Newsroom</span></a></li>
              <li class="main_nav__navi__tree__item"><a href="#"><span>Karriere</span></a></li>
            </ul>

            <!-- helper nav -->
            <aside class="main_nav__navi__helper">
              <ul class="main_nav__navi__helper__tree">
                <li class="main_nav__navi__helper__tree__item">
                  <a href="/de/kontakt"><span>Kontakt</span></a>
                </li>

                <!-- ✅ NEW: Privacy settings button -->
                <li class="main_nav__navi__helper__tree__item">
                  <button
                    class="privacy-settings-btn"
                    type="button"
                    aria-label="Privacy settings"
                    onclick="window.dispatchEvent(new Event('openPrivacySettings'))">
                    Privacy settings
                  </button>
                </li>
              </ul>
            </aside>
          </div>

        </div>
      </div>
    </nav>
  </header>

  <!-- ================= HERO ================= -->
  <main>
    <header class="main_header_slider">
      <div class="swiper-wrapper">

        <section class="swiper-slide">
          <div class="main_header main_header--lg">
            <figure class="main_header__figure">
              <img
                src="https://www.metroag.de/-/media/project/mag/shared/global/newsroom-media/videos/20260225-metro-chef-veal-still-169.jpg"
                alt=""
                style="width:100%;height:auto;" />
            </figure>

            <div class="main_header__content">
              <div class="container">
                <h1 class="field-headline">METRO Chef Kalbfleisch</h1>
                <p class="field-subheadline">
                  Unser METRO Chef Kalbfleisch steht für Premiumqualität in der Profiküche.
                  Für Frische, die überzeugt. Für Verantwortung, die man schmeckt.
                </p>
                <button class="btn btn-primary btn-iframe-consent">Spielen</button>
              </div>
            </div>
          </div>
        </section>

      </div>
    </header>

    <!-- other sections stay untouched -->
  </main>

</div>

<script>
  document.documentElement.classList.remove("no-js");
</script>

</body>
</html>
