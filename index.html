<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METRO AG – GitHub Pages Demo</title>

  <style>
    /* ===============================
       ORIGINAL STYLES (UNCHANGED)
       =============================== */

    :root {
      --page-bg: #dce7ed;
      --surface: #ffffff;
      --surface-soft: #dfeaf4;
      --border: #d5dee6;
      --metro-blue: #0a4a93;
      --metro-link: #0f7fd8;
      --white: #ffffff;
      --shadow-nav: 0 10px 28px rgba(10, 45, 88, 0.08);
      --nav-height: 108px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page-bg);
      font-family: Arial, Helvetica, "Segoe UI", sans-serif;
    }

    /* --- HEADER --- */

    .nav-shell {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100vw - 160px);
      background: var(--surface);
      border-radius: 6px;
      box-shadow: var(--shadow-nav);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
    }

    .logo-link img { width: 150px; }

    .nav-primary,
    .nav-utility {
      display: flex;
      align-items: center;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-primary { flex: 1; margin-left: 36px; }

    .nav-item,
    .nav-tool {
      position: relative;
      height: var(--nav-height);
      display: flex;
      align-items: center;
    }

    .nav-item::after,
    .nav-tool::after {
      content: "";
      position: absolute;
      right: 0;
      top: 28px;
      width: 1px;
      height: 50px;
      background: var(--border);
    }

    .nav-item:last-child::after,
    .nav-tool:last-child::after { display: none; }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 22px;
      font-size: 20px;
      font-weight: 700;
      color: var(--metro-blue);
      text-decoration: none;
    }

    .nav-link.contact { color: var(--metro-link); }

    .caret {
      width: 12px;
      height: 12px;
    }

    .caret svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
    }

    .nav-tool-btn {
      width: 64px;
      height: 100%;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--metro-blue);
    }

    .icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
    }

    /* ===============================
       PAGE CONTENT PLACEHOLDER
       =============================== */

    .page-fill {
      height: 120vh;
      padding-top: 160px;
      text-align: center;
    }

    /* ===============================
       HEADER FIX OVERRIDES (SAFE)
       =============================== */

    .nav-shell {
      height: 96px;
      min-height: 96px;
      max-height: 96px;
      padding-top: 6px;
      padding-bottom: 6px;
    }

    .nav-link {
      line-height: 1.15;
      padding-top: 1px;
      padding-bottom: 1px;
    }

    .nav-link .caret {
      margin-top: 2px;
    }

    .nav-tool-btn .icon {
      transform: translateY(1px);
    }

    .nav-item::after,
    .nav-tool::after {
      top: 50%;
      transform: translateY(-50%);
      height: 40px;
    }

    .nav-item,
    .nav-tool {
      align-items: center;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <nav class="nav-shell">
    <a class="logo-link" href="https://www.metroag.de/de">
      <img src="https://www.metroag.de/-/media/project/mag/shared/global/common/metro-logo-full_facelift.svg" alt="METRO" />
    </a>

    <ul class="nav-primary">
      <li class="nav-item">
        <a class="nav-link" href="#">Newsroom
          <span class="caret">
            <svg viewBox="0 0 12 12"><path d="M2 4.5 6 8l4-3.5"/></svg>
          </span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Karriere
          <span class="caret">
            <svg viewBox="0 0 12 12"><path d="M2 4.5 6 8l4-3.5"/></svg>
          </span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link contact" href="#">Kontakt</a>
      </li>
    </ul>

    <ul class="nav-utility">
      <li class="nav-tool">
        <button class="nav-tool-btn js-search-toggle" aria-expanded="false">
          <span class="icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="M16 16 21 21"/></svg>
          </span>
        </button>
      </li>
      <li class="nav-tool">
        <button class="nav-tool-btn js-theme-toggle">
          <span class="icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v3M12 18.5v3M21.5 12h-3M5.5 12h-3"/></svg>
          </span>
        </button>
      </li>
    </ul>
  </nav>

  <div class="page-fill">
    <!-- everything else from before remains here -->
  </div>

  <!-- ✅ INTEGRATED SCRIPT (UNCHANGED) -->
  <script>
    (function () {
      const root = document.documentElement;
      const navShell = document.querySelector('.nav-shell');
      const searchToggle = document.querySelector('.js-search-toggle');
      const themeToggle = document.querySelector('.js-theme-toggle');

      const savedTheme = localStorage.getItem('metro-demo-theme');
      if (savedTheme === 'dark' || savedTheme === 'light') {
        root.setAttribute('data-theme', savedTheme);
      }

      if (themeToggle) {
        themeToggle.addEventListener('click', function () {
          const nextTheme = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          root.setAttribute('data-theme', nextTheme);
          localStorage.setItem('metro-demo-theme', nextTheme);
        });
      }
    })();
  </script>

</body>
</html>
``
